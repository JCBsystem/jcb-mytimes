name: E2E Tests (Prod)

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  e2e:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: test

    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 9

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm
          cache-dependency-path: test/pnpm-lock.yaml

      - run: pnpm install

      - run: pnpm exec playwright install --with-deps chromium

      - name: Run e2e tests against prod
        run: pnpm test
        env:
          BASE_URL: https://jcb-mytime.web.app
